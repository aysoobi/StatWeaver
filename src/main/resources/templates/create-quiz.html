<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>Questionnaire</h1>
        <p><a href="/create">Start over</a> | <a href="/">Main</a></p>

        <p>
            <span class="pill">Character</span>
            <strong th:text="${characterName}"></strong>
        </p>

        <form method="post" action="/create/submit">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="characterName" th:value="${characterName}" />

            <div th:each="q, qStat : ${questions}" class="question-card">
                <h4>
                    <span class="pill" th:text="${qStat.index + 1}"></span>
                    <span th:text="${q.text}"></span>
                </h4>

                <div th:each="opt : ${q.options}" class="option-row">
                    <label>
                        <input
                                style="width: auto; margin-right: 6px;"
                                type="radio"
                                th:name="${'answer_' + q.id}"
                                th:value="${opt.id}"
                                required />
                        <span th:text="${opt.text}"></span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn">Create Character</button>
        </form>
    </div>
</div>
</body>
</html>
