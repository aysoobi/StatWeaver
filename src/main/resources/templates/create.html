<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Character</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="container">
    <div class="card" style="max-width: 560px; margin: 0 auto;">
        <h1>Create New Character</h1>
        <p><a href="/">Back to main</a> | <a href="/library">Go to library</a></p>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form method="post" action="/create/start">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="grid">
                <label for="characterName">Character name:</label>
                <input id="characterName" name="characterName" type="text" required />

                <label for="questionCount">Number of questions:</label>
                <input id="questionCount" name="questionCount" type="number" min="1" max="30" th:value="${defaultQuestionCount}" value="10" />

                <button type="submit" class="btn">Start</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
